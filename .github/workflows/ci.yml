name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install PDM
        run: python -m pip install pdm

      - name: Install dependencies
        run: pdm install -G test -G docs -G dev

      - name: Run pytest
        run: pdm run pytest

      - name: Build package
        run: pdm build

      - name: Build docs
        run: pdm run sphinx-build -b html docs docs/_build/html

      - name: Upload coverage and docs artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.python-version }}
          path: |
            build/reports/coverage
            docs/_build/html
            dist
