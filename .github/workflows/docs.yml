name: Docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - ".readthedocs.yaml"

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PDM
        run: python -m pip install pdm

      - name: Install docs dependencies
        run: pdm install -G docs -G test

      - name: Build docs
        run: pdm run sphinx-build -W --keep-going -b html docs docs/_build/html

      - name: Validate docs style
        run: pdm run doc8 docs
